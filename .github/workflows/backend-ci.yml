name: Backend CI

on:
  push:
    branches: [develop, "feat/**"]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gaokao_test
          POSTGRES_USER: gaokao
          POSTGRES_PASSWORD: gaokao
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gaokao -d gaokao_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://gaokao:gaokao@localhost:5432/gaokao_test
      TEST_DATABASE_URL: postgresql+asyncpg://gaokao:gaokao@localhost:5432/gaokao_test
      REDIS_URL: redis://localhost:6379/15
      TEST_REDIS_URL: redis://localhost:6379/15
      JWT_SECRET: ci-test-secret
      DEEPSEEK_API_KEY: test-key
      DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
      DEEPSEEK_MODEL: deepseek-chat
      CHROMA_PERSIST_DIR: ./chroma_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest tests/ -v
