name: Frontend CI

on:
  push:
    branches: [develop, "feat/**"]
  pull_request:
    branches: [develop, main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [admin-spa, mini-app]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generate mini-app tenant config
        if: matrix.app == 'mini-app'
        run: TENANT=scnu node build.config.js
      - name: Build
        if: matrix.app == 'admin-spa'
        run: npm run build
      - name: Build (H5)
        if: matrix.app == 'mini-app'
        run: npm run build:h5
