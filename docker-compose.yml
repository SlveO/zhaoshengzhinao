services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: gaokao
      POSTGRES_PASSWORD: gaokao
      POSTGRES_DB: gaokao
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaokao"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build: { context: ., dockerfile: docker/Dockerfile.backend }
    ports: ["8000:8000"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: [./backend:/app, ./data:/app/data, ms_cache:/root/.cache/modelscope]
    environment:
      - MODELSCOPE_CACHE=/root/.cache/modelscope

  frontend:
    build: { context: ., dockerfile: docker/Dockerfile.frontend }
    ports: ["3000:80"]
    depends_on: [backend]

volumes:
  pgdata:
  ms_cache:
